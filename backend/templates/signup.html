<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Smart Attendance</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #f4f4f9; margin: 0;
        }
        .login-box { 
            background: white; padding: 30px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; 
            text-align: center;
        }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ccc; border-radius: 5px; 
            box-sizing: border-box; font-size: 14px;
        }
        button { 
            width: 100%; padding: 12px; background: #28a745; 
            color: white; border: none; border-radius: 5px; 
            cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        button:hover { background: #218838; }
        .error { color: #dc3545; margin-bottom: 15px; font-weight: bold;}
        .link { margin-top: 15px; display: block; color: #007bff; text-decoration: none; font-size: 14px;}
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" style="height: 60px; width: 60px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color: #333; margin-top: 0;">Create an Account</h2>
        
        <!-- Display error messages here -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="password" name="password" placeholder="Create a Password" required>
            
            <select name="role" required>
                <option value="" disabled selected>Select your role...</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
            
            <button type="submit">Sign Up</button>
        </form>
        
        <a href="/login" class="link">Already have an account? Login here</a>
    </div>
</body>
</html>
